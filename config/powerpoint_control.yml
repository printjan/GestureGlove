# config/powerpoint_control.yml
# ----------------------------------------------------------------------------------------
# Configuration for the PowerPoint control interface
# (src/data_fusion_project/control).
#
# How it works:
#   - "actions" map a semantic name to a keyboard shortcut.
#   - "gesture_bindings" map a recognized gesture to one of those action names.
#   => To change what a gesture does, repoint its binding. To change the key it sends,
#      edit the action's shortcut. Add new actions freely and bind gestures to them.
#
# Shortcut syntax: tokens joined by "+", e.g. "right", "shift+f5", "ctrl+l".
#   Modifiers: ctrl, alt, shift, win
#   Keys:      a-z, 0-9, f1-f12, left, right, up, down, home, end, pageup, pagedown,
#              esc, enter, space, tab, backspace, delete, insert
# This file is optional: if it is deleted, the built-in defaults below are used.
# ----------------------------------------------------------------------------------------

# Timing
send_pause_s: 0.05      # pause pyautogui inserts after each key action (seconds)
focus_delay_s: 0.0      # delay before sending a shortcut, to let a window gain focus (seconds)

# Action name -> keyboard shortcut
actions:
  next_slide: right             # advance to next slide / animation
  previous_slide: left          # back to previous slide / animation
  start_presentation: f5        # start slide show from the beginning
  start_from_current: shift+f5  # start slide show from the current slide
  end_presentation: esc         # end the slide show
  first_slide: home             # jump to the first slide
  last_slide: end               # jump to the last slide
  toggle_black_screen: b        # toggle a black screen (pause)
  toggle_white_screen: w        # toggle a white screen
  laser_pointer: ctrl+l         # activate the laser pointer
  pen_tool: ctrl+p              # activate the pen / ink tool
  arrow_pointer: ctrl+a         # switch back to the normal arrow pointer
  erase_ink: ctrl+e             # switch to the eraser

# Gesture -> action binding. Use "null" to recognize a gesture but do nothing.
# These are the gestures the model already recognizes; each already has a fitting shortcut.
gesture_bindings:
  none: null                    # stillness / no gesture
  swipe_right: next_slide       # swipe right  -> next slide        (->)
  swipe_left: previous_slide    # swipe left   -> previous slide    (<-)
  circle_cw: start_presentation  # circle clockwise         -> start show (F5)
  circle_ccw: end_presentation  # circle counter-clockwise -> end show   (Esc)
  fist: toggle_black_screen     # fist         -> black screen (B)
  jerk_up: first_slide          # jerk up      -> first slide  (Home)
  jerk_down: last_slide         # jerk down    -> last slide   (End)
